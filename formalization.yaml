# Machine-readable summary of the AI-authored formalization in this repository:
# superlinear subword complexity of the (3/2)^n steering word (the M4/A3 program).
# Follows the comparator + formalization.yaml convention emerging in Lean Zulip's
# #AI-authored-projects.

project:
  name: superlinear-complexity
  title: "Superlinear complexity of the (3/2)^n steering word (Lean 4)"
  short_description: >
    Kernel-checked proof that the steering word of the (3/2)^n orbit has superlinear
    subword complexity (p_T(k)/k → ∞), modulo the Subspace Theorem and nothing else.
    The chain: the nearest-integer decomposition and exact circuit-sum algebra of the
    orbit (Stage 0); the repetition identity (Lemma R); a pigeonhole reduction of M4 to
    an exponential pair-repulsion kernel (K) (Stage 1); the Corvaja–Zannier 2004 gap
    slices, derived here from the Subspace Theorem (Stage 2b/2b'); and the gap dichotomy
    closing the remaining middle band via the Nair–Kumar–Rout pair theorem, also derived
    here from the Subspace Theorem (Stage 2c).  Along the way NKR's Theorem 1.3(i) is
    shown *false as stated* and is used only in a repaired, proved form.
  repository: "https://github.com/rwst/Superlinear-Complexity"
  paper: null 
  license: CC0-1.0

authorship:
  human: "Ralf Stephan (independent; gtrwst9@gmail.com) — direction and review"
  ai: "Claude (Anthropic), working in Claude Code — Lean proofs and prose drafting"
  disclosure: >
    All Lean in scope was AI-authored under human direction and review, per the
    per-file headers "(C) 2026 Ralf Stephan, in collaboration with Claude Code".

toolchain:
  lean: "leanprover/lean4:v4.32.0"
  mathlib: "pinned via lake-manifest.json"

verification:
  challenge_file: Challenge.lean
  solution_file: Solution.lean
  solution_module: Solution
  bridge_file: null
  comparator_config:
    - comparator/kernel.json     # TH.superlinear_of_kernel            — std3 only
    - comparator/capstone.json   # TH.superlinear_of_middleBand        — std3 + Subspace
    - comparator/superlinear.json # TH.kernel_holds, TH.complexity_superlinear — std3 + Subspace
  ci_workflow: .github/workflows/comparator.yml
  permitted_axioms: [propext, Classical.choice, Quot.sound, Subspace.evertseSchlickewei]
  # Deliberately split across three configs, so the axiom stratification is machine-checked
  # rather than merely asserted: kernel.json permits ONLY the standard three, certifying
  # that the Stage-1 reduction (K) ⟹ M4 leans on no cited literature at all. Comparator
  # compares the *types* of permitted axioms across both environments, so naming
  # Subspace.evertseSchlickewei is not a loophole — the solution cannot restate it as False.
  sorry_count_in_scope: 0        # the four sorries in Challenge.lean are the challenge
                                 # statements themselves
  native_decide_in_scope: false  # no native_decide anywhere in the repository
  audit_lines: null              # no in-repo `#print axioms` block; the axioms column below
                                 # was produced by `#print axioms` on 2026-07-14 and is
                                 # re-checked by CI via the three comparator configs
  statement_match_review: >
    open — external review requested. Comparator certifies proof-matches-statement and
    axiom discipline; the remaining link, that Challenge.lean's definitions faithfully
    capture the intended objects (the steering word, its subword complexity, the kernel),
    is closable only by a human reader. Challenge.lean is written to make exactly that
    reading cheap: it is the whole definitional chain in nine short definitions.

# Scope: all Lean files in the repository. `lake test` certifies the headline chain;
# every file below feeds it.
scope_files:
  - ForMathlib/Data/Rat/NearestInt.lean
  - CITED/SubspaceTheorem.lean
  - CITED/Ridout.lean
  - CITED/CorvajaZannier.lean
  - CITED/CorvajaZannierProof.lean
  - CITED/NairKumarRout.lean
  - CITED/NairKumarRoutLemmas.lean
  - CITED/NairKumarRoutProof.lean
  - TH/Basic.lean
  - TH/RepetitionIdentity.lean
  - TH/ComplexityLower.lean
  - TH/KernelReduction.lean
  - TH/GapSlices.lean
  - TH/CapstoneM4.lean
  - TH/GapDichotomy.lean

# Theorem-by-theorem correspondence. "std3" = propext, Classical.choice, Quot.sound.
# "std3 + Subspace" = std3 + the single cited axiom Subspace.evertseSchlickewei.
# Axiom columns verified by `#print axioms`, 2026-07-14.
theorems:
  # --- The one cited input, and the two Diophantine theorems derived from it ---
  - informal: "Subspace Theorem (Schmidt Thm 1D'; Evertse–Schlickewei S-arithmetic form)"
    lean: Subspace.evertseSchlickewei
    file: CITED/SubspaceTheorem.lean
    axioms: "AXIOM — the single cited input; not proved here, and not intended to be"
  - informal: "Ridout's theorem, S-unit ratio form (corollary of Subspace at n = 2)"
    lean: Ridout.finite_ratios
    file: CITED/Ridout.lean
    axioms: std3 + Subspace
  - informal: "Corvaja–Zannier 2004 Main Theorem, pseudo-Pisot approximation (Acta Math. 193)"
    lean: CZ.pseudoPisot_approx_of_subspace
    file: CITED/CorvajaZannierProof.lean
    axioms: std3 + Subspace
  - informal: "Nair–Kumar–Rout Thm 1.3(i) is FALSE as stated (arXiv:2506.02898)"
    lean: NKR.thm13i_unrepaired_false
    file: CITED/NairKumarRout.lean
    axioms: std3
  - informal: "Nair–Kumar–Rout pair theorem, repaired form (from Subspace at n = 3)"
    lean: NKR.sUnit_pair_integrality_of_subspace
    file: CITED/NairKumarRoutProof.lean
    axioms: std3 + Subspace

  # --- Stage 0: the orbit, the steering word, the circuit-sum algebra ---
  - informal: "Dyadic repulsion floor: 2^m·x an odd integer ⟹ dist(x, Z) ≥ 2^-m"
    lean: Rat.one_le_two_pow_mul_distToNearestInt
    file: ForMathlib/Data/Rat/NearestInt.lean
    axioms: std3
  - informal: "Circuit-sum closed form W(a,k) = 3^k·ε_a − 2^k·ε_{a+k}"
    lean: TH.W_closed, TH.circuit_sum
    file: TH/Basic.lean
    axioms: std3
  - informal: "Lemma R: the repetition identity"
    lean: TH.lemmaR_eps, TH.lemmaR_int
    file: TH/RepetitionIdentity.lean
    axioms: std3
  - informal: "The steering word is not eventually periodic"
    lean: TH.not_eventually_periodic
    file: TH/RepetitionIdentity.lean
    axioms: std3

  # --- Stage 1: the unconditional complexity floor, and the reduction to (K) ---
  - informal: "Unconditional linear complexity floor: 41k ≤ 24·p_T(k) + 72"
    lean: TH.factor_complexity_lower
    file: TH/ComplexityLower.lean
    axioms: std3
  - informal: "Stage-1 reduction: kernel (K) ⟹ M4"
    lean: TH.superlinear_of_kernel
    file: TH/KernelReduction.lean
    axioms: std3
    challenge_name: superlinear_of_kernel

  # --- Stage 2b/2b': the CZ gap slices ---
  - informal: "Gap-bounded slice of the kernel is finite (Stage 2b, via CZ 2004)"
    lean: TH.gapBounded_slice_finite
    file: TH/GapSlices.lean
    axioms: std3 + Subspace
  - informal: "Huge-gap slice of the kernel is finite (Stage 2b', via CZ 2004)"
    lean: TH.hugeGap_slice_finite
    file: TH/GapSlices.lean
    axioms: std3 + Subspace

  # --- The conditional capstone: the axiom-input-free statement of record ---
  - informal: "Conditional capstone: middle-band finiteness ⟹ M4 (middle band a hypothesis)"
    lean: TH.superlinear_of_middleBand
    file: TH/CapstoneM4.lean
    axioms: std3 + Subspace
    challenge_name: superlinear_of_middleBand

  # --- Stage 2c: the gap dichotomy closes the middle band; the headline follows ---
  - informal: "The middle band is finite (Stage 2c discharged, via the repaired NKR)"
    lean: TH.middleBandViolators_finite
    file: TH/GapDichotomy.lean
    axioms: std3 + Subspace
  - informal: "The Diophantine kernel (K) holds at every rational scale (the gap dichotomy)"
    lean: TH.pairRepulsion_all, TH.kernel_holds
    file: TH/GapDichotomy.lean
    axioms: std3 + Subspace
    challenge_name: kernel_holds
  - informal: "M4 (HEADLINE): the steering word has superlinear subword complexity, p_T(k)/k → ∞"
    lean: TH.complexity_superlinear
    file: TH/GapDichotomy.lean
    axioms: std3 + Subspace
    challenge_name: complexity_superlinear

known_gaps:
  - >
    The result is ineffective throughout: it descends from the Subspace Theorem, so it
    yields no computable K(C) in `∀ C, ∃ K, ∀ k ≥ K, C·k < p_T(k)`.
  - >
    PROVENANCE, load-bearing: the Stage-2c gap dichotomy consumes the Nair–Kumar–Rout
    pair theorem (arXiv:2506.02898), an UNREFEREED PREPRINT whose Theorem 1.3(i) is false
    as stated — `NKR.thm13i_unrepaired_false` proves it false, on std3. This repository
    therefore does not cite it as an axiom: it states a repaired form and *derives* it
    from the Subspace Theorem at n = 3 (`NKR.sUnit_pair_integrality_of_subspace`). The
    repaired statement and its derivation are this repository's own work and have had no
    external mathematical review; they are the least-reviewed link in the chain and the
    first place a reader should look. The preprint-free fallback of record is the
    conditional `TH.superlinear_of_middleBand`, which assumes middle-band finiteness
    outright.
  - >
    The Subspace Theorem (`Subspace.evertseSchlickewei`) is a cited axiom, not formalized:
    a geometry-of-numbers and heights-of-subspaces argument that is not re-derived. Its
    statement is pinned by comparator (Challenge.lean declares it verbatim), so it cannot
    drift, but its *faithfulness to the literature* is a human-review obligation.
  - >
    The gap dichotomy (Stage 2c) is described in the docstrings as "an unpublished
    one-page argument formalized here for the first time". It has no published referent,
    so `TH.pairRepulsion_all` is new mathematics, not a formalization of a known proof.
  - >
    The [M4A3] plan document cited throughout the docstrings (`plan-M4A3.html`) is not
    present in the repository, so the section references (§2, §3.1, §6.3, §9, …) are
    currently unresolvable by a reader.
